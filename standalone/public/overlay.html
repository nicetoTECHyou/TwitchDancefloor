<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>TwitchDancefloor - OBS Overlay</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1920px; height: 1080px; overflow: hidden; background: transparent; }
canvas { display: block; width: 1920px; height: 1080px; }
#audio-controls {
  position: fixed; bottom: 10px; right: 10px; z-index: 100;
  opacity: 0; transition: opacity 0.4s;
  background: rgba(0,0,0,0.8); border-radius: 10px; padding: 10px;
  border: 1px solid rgba(0,255,136,0.2);
}
#audio-controls:hover { opacity: 1; }
#audio-controls button {
  background: #00ff88; color: #000; border: none; border-radius: 4px;
  padding: 5px 12px; font-size: 12px; cursor: pointer; font-weight: 600;
}
#audio-controls button:hover { background: #00cc66; }
#audio-controls select {
  background: #1a1a2e; color: #fff; border: 1px solid #333;
  border-radius: 4px; padding: 4px 8px; font-size: 12px;
}
#audio-controls label { color: #aaa; font-size: 11px; }
#audio-controls .audio-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
#audio-controls .beat-indicator {
  width: 16px; height: 16px; border-radius: 50%; background: #333;
  transition: background 0.05s, box-shadow 0.05s;
}
#audio-controls .beat-indicator.active { background: #ff0066; box-shadow: 0 0 12px #ff0066; }
#status-dot {
  position: fixed; top: 10px; right: 10px; width: 8px; height: 8px;
  border-radius: 50%; background: #ff0044; z-index: 100;
  transition: background 0.3s;
}
#status-dot.connected { background: #00ff88; }
</style>
</head>
<body>
<canvas id="overlay" width="1920" height="1080"></canvas>
<div id="status-dot"></div>
<div id="audio-controls">
  <div class="audio-row">
    <label>Audio:</label>
    <select id="audio-source">
      <option value="none">Aus</option>
      <option value="mic">Mikrofon</option>
      <option value="desktop">Desktop Audio</option>
      <option value="file">Audio Datei</option>
    </select>
    <button id="btn-connect-audio">Verbinden</button>
    <div class="beat-indicator" id="beat-dot"></div>
  </div>
  <div class="audio-row">
    <label>Sensitivity:</label>
    <input type="range" id="sensitivity" min="0.5" max="4" step="0.1" value="1.8" style="width:100px;">
  </div>
  <input type="file" id="audio-file-input" accept="audio/*" style="display:none">
</div>
<script src="/socket.io/socket.io.js"></script>
<script src="/js/socket-client.js"></script>
<script src="/js/audio-analyzer.js"></script>
<script src="/js/effects.js"></script>
<script src="/js/dancers.js"></script>
<script src="/js/overlay.js"></script>
</body>
</html>
